# Local production-like stack: API + frontend + Postgres + Qdrant + Redis.
services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: [.env]
    environment:
      ENVIRONMENT: production
      LOG_JSON: "true"
      MEMORY_DB_URL: postgresql+psycopg://alphamind:alphamind@postgres:5432/alphamind
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      qdrant: {condition: service_started}
      redis: {condition: service_started}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on: [api]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alphamind
      POSTGRES_PASSWORD: alphamind
      POSTGRES_DB: alphamind
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphamind"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrantdata:/qdrant/storage"]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redisdata:/data"]

volumes:
  pgdata:
  qdrantdata:
  redisdata:
